name: Build and Deploy to K8s

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-21npa443x69e7rrn.cn-chengdu.personal.cr.aliyuncs.com
  NAMESPACE: greys-wordpress
  IMAGE_NAME: my-nginx-demo
  DEPLOYMENT_NAME: my-nginx-demo
  CONTAINER_NAME: nginx-container

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 构建 Docker 镜像
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: 推送镜像到 ACR
        run: |
          docker push ${{ env.ACR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: 配置 kubectl 访问集群
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: 更新 K8s Deployment 镜像
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} ${{ env.CONTAINER_NAME }}=${{ env.ACR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n default
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n default
